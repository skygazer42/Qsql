  <path d="M1242 403H1120" stroke="#14B8A6" stroke-width="4" marker-end="url(#arch-arrow)"/>
  <path d="M1242 515H1120" stroke="#14B8A6" stroke-width="4" marker-end="url(#arch-arrow)"/>
  <path d="M1368 670V718" stroke="#3B82F6" stroke-width="4" marker-end="url(#arch-arrow)"/>
  <path d="M952 554V718" stroke="#3B82F6" stroke-width="4" marker-end="url(#arch-arrow)"/>
