  <rect x="72" y="572" width="1356" height="16" rx="8" fill="url(#meta-brand)" opacity="0.18"/>
  <text x="72" y="608" fill="#475569" font-family="PingFang SC, Microsoft YaHei, Inter, sans-serif" font-size="18" font-weight="500">先把物理结构同步清楚，再把业务语义补齐，最后把正式目录交给查询运行时。</text>
